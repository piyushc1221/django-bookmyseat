{% extends "users/basic.html" %}

{% block content %}

<div class="row justify-content-center mt-5">

    <div class="col-md-5">

        <div class="card shadow-lg border-0 rounded-4">

            <div class="card-body p-5">

                <div class="text-center mb-4">
                    <h2 class="fw-bold text-primary">
                        🔐 Login
                    </h2>
                    <p class="text-muted">
                        Welcome back! Sign in to continue.
                    </p>
                </div>

                <form method="POST">
                    {% csrf_token %}

                    <div class="mb-3">
                        {{ form.username.label_tag }}
                        {{ form.username }}
                    </div>

                    <div class="mb-3">
                        {{ form.password.label_tag }}
                        {{ form.password }}
                    </div>

                    <div class="d-grid">
                        <button class="btn btn-primary btn-lg rounded-3" type="submit">
                            Login
                        </button>
                    </div>
                </form>

                <hr>

                <div class="text-center">

                    <p class="mb-2">
                        Don't have an account?
                        <a href="{% url 'register' %}" class="text-decoration-none fw-bold">
                            Register
                        </a>
                    </p>

                    <p>
                        Forgot Password?
                        <a href="{% url 'password_reset' %}" class="text-decoration-none fw-bold text-danger">
                            Reset Here
                        </a>
                    </p>

                </div>

            </div>

        </div>

    </div>

</div>

<style>

.card{
    background: white;
    transition: .3s;
}

.card:hover{
    transform: translateY(-5px);
}

input{
    width:100%;
    padding:12px;
    border-radius:12px;
    border:1px solid #ced4da;
    outline:none;
    transition:.3s;
}

input:focus{
    border-color:#0d6efd;
    box-shadow:0 0 10px rgba(13,110,253,.2);
}

.btn-primary{
    background:linear-gradient(90deg,#4e54c8,#8f94fb);
    border:none;
}

.btn-primary:hover{
    background:linear-gradient(90deg,#3b40b0,#7479e6);
}

</style>

{% endblock %}
