{% extends "users/basic.html" %}

{% block content %}

<div class="row justify-content-center mt-5">

    <div class="col-md-6">

        <div class="card shadow-lg border-0 rounded-4 text-center">

            <div class="card-body p-5">

                <div class="mb-4">
                    <h1 class="display-1">👋</h1>
                </div>

                <h2 class="fw-bold text-success mb-3">
                    Logged Out Successfully
                </h2>

                <p class="text-muted mb-4">
                    Thank you for using <strong>BookMySeat</strong>.<br>
                    We hope to see you again soon!
                </p>

                <a href="{% url 'login' %}" class="btn btn-primary btn-lg px-4 rounded-3">
                    🔐 Login Again
                </a>

                <div class="mt-3">
                    <a href="/" class="text-decoration-none">
                        🏠 Return to Home
                    </a>
                </div>

            </div>

        </div>

    </div>

</div>

<style>

.card{
    background: white;
    transition: .3s;
}

.card:hover{
    transform: translateY(-5px);
}

.btn-primary{
    background: linear-gradient(90deg,#4e54c8,#8f94fb);
    border: none;
}

.btn-primary:hover{
    background: linear-gradient(90deg,#3b40b0,#7479e6);
}

</style>

{% endblock %}
