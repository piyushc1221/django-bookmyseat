{% extends "users/basic.html" %}

{% block content %}

<div class="row justify-content-center mt-5">

    <div class="col-md-6">

        <div class="card shadow-lg border-0 rounded-4">

            <div class="card-body p-5">

                <div class="text-center mb-4">
                    <h1 class="display-1">🔑</h1>

                    <h2 class="fw-bold text-primary">
                        Reset Password
                    </h2>

                    <p class="text-muted">
                        Enter your email address and we'll send you a link to reset your password.
                    </p>
                </div>

                <form method="POST">
                    {% csrf_token %}

                    {{ form.as_p }}

                    <div class="d-grid mt-4">
                        <button class="btn btn-primary btn-lg rounded-3" type="submit">
                            📧 Send Reset Link
                        </button>
                    </div>

                </form>

                <div class="text-center mt-4">
                    <p class="text-muted">
                        Remembered your password?
                        <a href="{% url 'login' %}" class="text-decoration-none fw-bold">
                            Login Here
                        </a>
                    </p>
                </div>

            </div>

        </div>

    </div>

</div>

<style>

.card{
    background: white;
    transition: 0.3s;
}

.card:hover{
    transform: translateY(-5px);
}

input{
    width:100%;
    padding:12px;
    border:1px solid #ced4da;
    border-radius:12px;
    outline:none;
    transition:0.3s;
}

input:focus{
    border-color:#0d6efd;
    box-shadow:0 0 10px rgba(13,110,253,.2);
}

.btn-primary{
    border:none;
    background:linear-gradient(90deg,#4e54c8,#8f94fb);
}

.btn-primary:hover{
    background:linear-gradient(90deg,#3b40b0,#7479e6);
}

label{
    font-weight:600;
    margin-bottom:8px;
}

</style>

{% endblock %}
