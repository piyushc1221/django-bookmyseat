{% extends "users/basic.html" %}

{% block content %}

<div class="row justify-content-center mt-5">

    <div class="col-md-6">

        <div class="card shadow-lg border-0 rounded-4 text-center">

            <div class="card-body p-5">

                <div class="mb-4">
                    <h1 class="display-1">📧</h1>
                </div>

                <h2 class="fw-bold text-success mb-3">
                    Reset Link Sent
                </h2>

                <p class="text-muted mb-4">
                    We've emailed you instructions for setting your password.<br>
                    Please check your inbox and follow the link provided.
                </p>

                <p class="text-secondary">
                    Didn't receive the email? Check your spam folder or try again.
                </p>

                <div class="mt-4">
                    <a href="{% url 'login' %}" class="btn btn-primary btn-lg rounded-3 px-4">
                        🔐 Back to Login
                    </a>
                </div>

            </div>

        </div>

    </div>

</div>

<style>

.card{
    background: white;
    transition: .3s;
}

.card:hover{
    transform: translateY(-5px);
}

.btn-primary{
    border: none;
    background: linear-gradient(90deg,#4e54c8,#8f94fb);
}

.btn-primary:hover{
    background: linear-gradient(90deg,#3b40b0,#7479e6);
}

</style>

{% endblock %}
