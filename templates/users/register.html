{% extends "users/basic.html" %}

{% block content %}

<div class="row justify-content-center mt-5">

    <div class="col-md-6">

        <div class="card shadow-lg border-0 rounded-4">

            <div class="card-body p-5">

                <div class="text-center mb-4">
                    <h1 class="display-4">🎬</h1>
                    <h2 class="fw-bold text-primary">
                        Create Account
                    </h2>
                    <p class="text-muted">
                        Join BookMySeat and book your favorite movies effortlessly.
                    </p>
                </div>

                <form method="POST">
                    {% csrf_token %}

                    {{ form.as_p }}

                    <div class="d-grid mt-4">
                        <button class="btn btn-primary btn-lg rounded-3" type="submit">
                            Register
                        </button>
                    </div>

                </form>

                <hr>

                <div class="text-center">

                    <p class="text-muted">
                        Already have an account?
                    </p>

                    <a href="{% url 'login' %}"
                       class="btn btn-outline-primary rounded-pill px-4">
                        🔐 Login Here
                    </a>

                </div>

            </div>

        </div>

    </div>

</div>

<style>

.card{
    background:white;
    transition:.3s;
}

.card:hover{
    transform:translateY(-5px);
}

input{
    width:100%;
    padding:12px;
    border:1px solid #ced4da;
    border-radius:12px;
    margin-bottom:15px;
    transition:.3s;
}

input:focus{
    outline:none;
    border-color:#0d6efd;
    box-shadow:0 0 10px rgba(13,110,253,.2);
}

.btn-primary{
    border:none;
    background:linear-gradient(90deg,#4e54c8,#8f94fb);
}

.btn-primary:hover{
    background:linear-gradient(90deg,#3b40b0,#7479e6);
}

.helptext{
    color:#6c757d;
    font-size:14px;
}

ul{
    color:#6c757d;
    padding-left:20px;
}

</style>

{% endblock %}
